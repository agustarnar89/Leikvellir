name: Supabase Keep-Alive
on:
  schedule:
    - cron: '0 6 * * 1'   # á hverjum mánudegi kl. 06:00 UTC
  workflow_dispatch:      # leyfir handvirka keyrslu líka

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s "https://zgqskvahbkliqumaggyl.supabase.co/rest/v1/playground_info?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
